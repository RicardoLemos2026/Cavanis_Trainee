<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avaliação da Trainee — Cavani's Cleaning Services</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#0d9e82;--teal-dark:#0b7f68;--teal-light:#e0f5f0;--teal-mid:#9eddd1;
  --green-bg:#eaf3de;--green-text:#3b6d11;
  --amber-bg:#faeeda;--amber-text:#854f0b;
  --red-bg:#fcebeb;--red-text:#a32d2d;
  --gray-50:#fafaf9;--gray-100:#f4f3f0;--gray-200:#e8e6e1;
  --gray-400:#a09e97;--gray-600:#5f5e5a;--gray-800:#2c2c2a;
  --white:#ffffff;
  --r-sm:6px;--r-md:10px;--r-lg:14px;
  --sh-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--gray-100);color:var(--gray-800);min-height:100vh;font-size:15px;line-height:1.6}
.topbar{background:var(--white);border-bottom:1px solid var(--gray-200);position:sticky;top:0;z-index:100;box-shadow:var(--sh-sm)}
.topbar-inner{max-width:760px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:14px;height:54px}
.logo{width:30px;height:30px;background:var(--teal);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo svg{width:16px;height:16px;fill:white}
.topbar-title{font-size:14px;font-weight:500;color:var(--gray-800);flex:1}
.topbar-title span{color:var(--gray-400);font-weight:400}
.lang-sel{display:flex;gap:3px;background:var(--gray-100);border-radius:var(--r-md);padding:3px;margin-left:auto}
.lang-btn{padding:4px 10px;border-radius:var(--r-sm);font-size:11px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;background:none;color:var(--gray-400);transition:all .15s;letter-spacing:.04em}
.lang-btn:hover{color:var(--gray-800)}
.lang-btn.on{background:var(--white);color:var(--teal);box-shadow:var(--sh-sm)}
.hero{background:var(--white);border-bottom:4px solid var(--teal);padding:36px 20px 30px}
.hero-inner{max-width:760px;margin:0 auto}
.eyebrow{display:inline-flex;align-items:center;gap:6px;background:var(--teal-light);color:var(--teal);font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:4px 12px;border-radius:20px;margin-bottom:14px}
h1{font-family:'DM Serif Display',serif;font-size:clamp(24px,4vw,34px);font-weight:400;line-height:1.2;margin-bottom:8px}
h1 em{font-style:italic;color:var(--teal)}
.hero-desc{font-size:14px;color:var(--gray-600);max-width:540px;line-height:1.7}
.hero-pills{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px;padding-top:18px;border-top:1px solid var(--gray-200)}
.pill{display:inline-flex;align-items:center;gap:5px;background:var(--gray-100);color:var(--gray-600);font-size:12px;font-weight:500;padding:5px 12px;border-radius:20px}
.pill .dot{width:6px;height:6px;border-radius:50%;background:var(--teal)}
.nota{background:var(--teal-light);border-left:3px solid var(--teal);padding:13px 18px;border-radius:0 var(--r-md) var(--r-md) 0;margin:0 20px 0}
.nota-inner{max-width:760px;margin:0 auto}
.nota p{font-size:13px;color:var(--teal-dark);line-height:1.5}
.nota p strong{font-weight:600}
.tabs-wrap{background:var(--white);border-bottom:1px solid var(--gray-200);position:sticky;top:54px;z-index:90;box-shadow:var(--sh-sm)}
.tabs-inner{max-width:760px;margin:0 auto;padding:0 20px;display:flex;overflow-x:auto;scrollbar-width:none}
.tabs-inner::-webkit-scrollbar{display:none}
.tab{padding:13px 16px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;color:var(--gray-400);border:none;background:none;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .18s;display:flex;align-items:center;gap:6px}
.tab:hover{color:var(--gray-800)}.tab.on{color:var(--teal);border-bottom-color:var(--teal)}
.tab-badge{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:var(--gray-100);font-size:10px;font-weight:700;color:var(--gray-600);transition:all .18s}
.tab.on .tab-badge{background:var(--teal-light);color:var(--teal)}
.main{max-width:760px;margin:0 auto;padding:24px 20px 80px}
.section{display:none}.section.on{display:block;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.ph{display:flex;align-items:flex-start;gap:12px;padding:16px 18px;background:var(--white);border-radius:var(--r-lg);border-left:4px solid var(--teal);box-shadow:var(--sh-sm);margin-bottom:18px}
.ph-icon{width:38px;height:38px;background:var(--teal-light);border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:17px}
.ph h2{font-family:'DM Serif Display',serif;font-size:17px;font-weight:400;margin-bottom:2px}.ph p{font-size:13px;color:var(--gray-600);line-height:1.5}
.ph-pill{margin-left:auto;flex-shrink:0;background:var(--teal-light);color:var(--teal);font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap;align-self:flex-start}
.noreprova{display:flex;align-items:flex-start;gap:10px;background:var(--green-bg);border-radius:var(--r-lg);padding:12px 16px;margin-bottom:18px}
.noreprova p{font-size:13px;color:var(--green-text);line-height:1.5}
.card{background:var(--white);border-radius:var(--r-lg);box-shadow:var(--sh-sm);border:1px solid var(--gray-200);margin-bottom:14px;overflow:hidden}
.ch{padding:16px 22px 12px;border-bottom:1px solid var(--gray-100)}.ch h3{font-size:14px;font-weight:600;color:var(--gray-800);margin-bottom:2px}
.cb{padding:18px 22px}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:500px){.ig{grid-template-columns:1fr}}
.if label{display:block;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--gray-400);margin-bottom:5px}
.if input,.if select{width:100%;padding:9px 11px;border:1.5px solid var(--gray-200);border-radius:var(--r-sm);font-size:14px;font-family:'DM Sans',sans-serif;color:var(--gray-800);background:var(--gray-50);outline:none;transition:border-color .15s}
.if input:focus,.if select:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(13,158,130,.12)}
.field{margin-bottom:20px}.field:last-child{margin-bottom:0}
.fl{display:block;font-size:14px;font-weight:500;color:var(--gray-800);margin-bottom:9px;line-height:1.5}
.fl .req{color:var(--teal);margin-left:2px}
.rg{display:flex;flex-direction:column;gap:6px}
.ro{display:flex;align-items:flex-start;gap:9px;padding:10px 13px;border:1.5px solid var(--gray-200);border-radius:var(--r-md);cursor:pointer;transition:all .15s;background:var(--gray-50)}
.ro:hover{border-color:var(--teal-mid);background:var(--teal-light)}
.ro input{accent-color:var(--teal);width:16px;height:16px;cursor:pointer;flex-shrink:0;margin-top:2px}
.ro label{font-size:14px;color:var(--gray-800);cursor:pointer;line-height:1.4}
.score-row{display:flex;gap:7px;align-items:center}
.sb{width:44px;height:44px;border-radius:50%;border:1.5px solid var(--gray-200);background:var(--white);font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;color:var(--gray-600);cursor:pointer;transition:all .15s;flex-shrink:0}
.sb:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-light)}
.sb.sel{background:var(--teal);border-color:var(--teal);color:var(--white);box-shadow:0 2px 8px rgba(13,158,130,.3)}
.sc-labels{display:flex;justify-content:space-between;margin-top:5px;padding:0 2px}.sc-labels span{font-size:11px;color:var(--gray-400)}
textarea{width:100%;padding:10px 11px;border:1.5px solid var(--gray-200);border-radius:var(--r-sm);font-size:14px;font-family:'DM Sans',sans-serif;color:var(--gray-800);background:var(--gray-50);resize:vertical;min-height:68px;outline:none;transition:border-color .15s;line-height:1.5}
textarea:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(13,158,130,.12);background:var(--white)}
.div{border:none;border-top:1px solid var(--gray-100);margin:20px 0}
.acts{display:flex;align-items:center;justify-content:space-between;padding-top:18px;border-top:1px solid var(--gray-100);flex-wrap:wrap;gap:10px}
.btn-p{background:var(--teal);color:var(--white);border:none;border-radius:var(--r-md);padding:11px 26px;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;box-shadow:0 2px 8px rgba(13,158,130,.25);display:flex;align-items:center;gap:7px}
.btn-p:hover{background:var(--teal-dark);transform:translateY(-1px)}
.btn-g{background:none;border:1.5px solid var(--gray-200);border-radius:var(--r-md);padding:11px 18px;font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;color:var(--gray-600);cursor:pointer;transition:all .15s}
.btn-g:hover{border-color:var(--gray-400);color:var(--gray-800)}
.toast{position:fixed;bottom:22px;right:22px;background:var(--gray-800);color:var(--white);padding:12px 18px;border-radius:var(--r-md);font-size:14px;font-weight:500;box-shadow:var(--sh-md);transform:translateY(80px);opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);z-index:600;max-width:300px;display:flex;align-items:center;gap:9px}
.toast.show{transform:translateY(0);opacity:1}
.t-icon{width:20px;height:20px;background:var(--green-text);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
@media(max-width:600px){.topbar-inner{padding:0 12px}.main{padding:16px 12px 60px}}
/* ── SPINNER ── */
.btn-p:disabled{opacity:.7;cursor:not-allowed;transform:none!important}
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* ── PRINT ── */
@media print{
  .topbar,.tabs-wrap,.lang-sel,.acts,.btn-p,.btn-g,.toast,.noreprova,.nota{display:none!important}
  body{background:#fff;font-size:12px}
  .hero{border:none;padding:16px 0 12px}
  .card{box-shadow:none;border:1px solid #ddd;break-inside:avoid;margin-bottom:10px}
  .section{display:block!important}
  .main{padding:0}
  .ro{border:1px solid #ccc;padding:6px 10px}
  .ro input{display:none}
  h1{font-size:22px}
}
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="logo"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg></div>

    <div class="lang-sel">

      <button class="lang-btn" onclick="setLang('en')">EN</button>

</header>

<div class="hero">

  </div>
</div>

<main class="main">

<div class="section on" id="s1">

  <div class="noreprova"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3b6d11" stroke-width="2" style="flex-shrink:0;margin-top:1px"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><p id="noreprova-txt"></p></div>

<div class="section" id="s2">

  <div class="noreprova"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3b6d11" stroke-width="2" style="flex-shrink:0;margin-top:1px"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg><p id="noreprova-txt2"></p></div>

  <div class="card"><div class="ch"><h3 id="s2-ident-h"></h3></div><div class="cb">

          <option value="3" id="s2-opt3"></option>
          <option value="4" id="s2-opt4"></option>
        </select>
      </div>
    </div>

  <div class="card"><div class="ch"><h3 id="s2-vel-h"></h3></div><div class="cb" id="s2-vel-body"></div></div>
  <div class="card"><div class="ch"><h3 id="s2-fb-h"></h3></div><div class="cb" id="s2-fb-body"></div></div>
  <div class="card"><div class="ch"><h3 id="s2-auto-h"></h3></div><div class="cb" id="s2-auto-body"></div></div>
</div>

</main>

<div class="toast" id="toast"><div class="t-icon"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div><span id="toast_m"></span></div>

let lang = 'pt';
const T = () => LANGS[lang];

function setLang(l) {
  lang = l;
  try { localStorage.setItem('cavanis_lang_trainee', l); } catch(e) {}
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('on', b.textContent === l.toUpperCase()));
  applyLang();
}

function applyLang() {
  const t = T();
  const set = (id, v) => { const el = document.getElementById(id); if(el) el.innerHTML = v; };

  set('topbar-sub', t.topbarSub);
  set('hero-ey', t.heroEy);
  set('hero-h1', t.heroH1);
  setT('hero-desc', t.heroDesc);
  document.getElementById('hero-pills').innerHTML =
    `<div class="pill"><div class="dot"></div>${t.pill1}</div>` +
    `<div class="pill"><div class="dot"></div>${t.pill2}</div>` +
    `<div class="pill"><div class="dot"></div>${t.pill3}</div>`;
  set('nota-txt', t.nota);
  setT('tab-s1-lbl', t.tab1); setT('tab-s2-lbl', t.tab2);
  set('ph1-h', t.ph1H); setT('ph1-p', t.ph1P); setT('ph1-pill', t.ph1Pill);
  set('ph2-h', t.ph2H); setT('ph2-p', t.ph2P); setT('ph2-pill', t.ph2Pill);

  setT('s1-opt0', t.semOpt0); setT('s1-opt1', t.semOpt1); setT('s1-opt2', t.semOpt2);
  setT('s2-opt0', t.semOpt0); setT('s2-opt3', t.semOpt3); setT('s2-opt4', t.semOpt4);

    `<div class="field"><label class="fl">${t.s2Auto3} <span class="req">*</span></label><div class="rg">${ro('s2_eq','a',t.s2Auto3a)+ro('s2_eq','b',t.s2Auto3b)+ro('s2_eq','c',t.s2Auto3c)}</div></div>` +
    `<hr class="div">` +
    `<div class="field"><label class="fl">${t.s2NotaLbl} <span class="req">*</span></label>${scoreRow('g_s2')}<div class="sc-labels"><span>${t.muitoRuim}</span><span>${t.excelente}</span></div></div>` +

function go(id) {
  ['s1','s2'].forEach(s => document.getElementById(s).classList.toggle('on', s===id));
  document.querySelectorAll('.tab').forEach((b,i) => b.classList.toggle('on', ['s1','s2'][i]===id));
  window.scrollTo({top:0,behavior:'smooth'});
}

function scSimp(btn, gid) {
  document.getElementById(gid).querySelectorAll('.sb').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
}

// ══════════════════════════════════════════════════════
// CONFIGURAÇÃO — cole aqui a URL do seu Apps Script
// ══════════════════════════════════════════════════════
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwlO4g9sNJ-83Zu7ag-N-JQm2hstawPZIuKNaFcFxjcSJeiJok7wxJOImSt0YINC03L/exec';

function getRadio(name) {
  const el = document.querySelector(`input[name="${name}"]:checked`);
  return el ? el.value : '';
}
function getScore(gid) {
  const sel = document.querySelector(`#${gid} .sb.sel`);
  return sel ? sel.textContent.trim() : '';
}
function getVal(id) {
  const el = document.getElementById(id);
  return el ? el.value.trim() : '';
}
function getTextareas(sectionId) {
  const areas = document.querySelectorAll(`#${sectionId} textarea`);
  const result = {};
  areas.forEach((ta, i) => { result[`textarea_${i+1}`] = ta.value.trim(); });
  return result;
}

function collectData(section) {
  const t = T();
  const base = {
    timestamp: new Date().toISOString(),
    idioma: lang,
    formulario: section === 's1' ? t.s1EnvioLabel : t.s2EnvioLabel,
  };
  if (section === 's1') {
    return { ...base,
      nome:         getVal('s1_nome'),
      treinadora:   getVal('s1_tr'),
      data:         getVal('s1_data'),
      semana:       getVal('s1_sem'),
      clareza_instrucoes:   getRadio('s1_cl'),
      demonstrou_processo:  getRadio('s1_dem'),
      vontade_perguntas:    getRadio('s1_dv'),
      feedback_respeitoso:  getRadio('s1_fb'),
      explicou_porque:      getRadio('s1_por'),
      treinadora_disponivel:getRadio('s1_disp'),
      entendeu_processos:   getRadio('s1_pr'),
      recebeu_materiais:    getRadio('s1_mat'),
      segura_admitir:       getRadio('s1_seg'),
      nota_geral:           getScore('g_s1'),
      ...getTextareas('s1'),
    };
  } else {
    return { ...base,
      nome:         getVal('s2_nome'),
      treinadora:   getVal('s2_tr'),
      data:         getVal('s2_data'),
      semana:       getVal('s2_sem'),
      mais_rapida:        getRadio('s2_v1'),
      tarefas_sem_perguntar: getRadio('s2_v2'),
      tempo_realista:     getRadio('s2_t'),
      feedback_velocidade:getRadio('s2_fb'),
      mais_confiante:     getRadio('s2_conf'),
      padrao_justo:       getRadio('s2_jus'),
      parte_equipe:       getRadio('s2_eq'),
      nota_desempenho:    getScore('g_s2'),
      motivada:           getRadio('s2_mot'),
      ...getTextareas('s2'),
    };
  }
}

function validateSection(section) {
  const data = collectData(section);
  if (!data.nome) { alert('Por favor, informe seu nome.'); return false; }
  if (!data.semana) { alert('Por favor, selecione a semana.'); return false; }
  const nota = section === 's1' ? data.nota_geral : data.nota_desempenho;
  if (!nota) { alert('Por favor, atribua uma nota geral.'); return false; }
  return true;
}

async function send(name) {
  const section = name.includes(T().s1EnvioLabel) || name === T().s1EnvioLabel ? 's1' : 's2';
  if (!validateSection(section)) return;

  // Localiza o botão e coloca spinner
  const btn = document.querySelector(`#${section} .btn-p`);
  const originalHTML = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = `<span class="spin"></span> Enviando...`;

  const data = collectData(section);

  try {
    // Google Apps Script requer no-cors; a resposta será opaque mas o dado chega
    await fetch(SHEET_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    btn.disabled = false;
    btn.innerHTML = originalHTML;
    toast(T().toastEnviado(name));
    // Limpa o formulário após envio bem-sucedido
    setTimeout(() => cls(section), 1200);
  } catch (err) {
    btn.disabled = false;
    btn.innerHTML = originalHTML;
    toast('Erro ao enviar. Verifique sua conexão.');
    console.error(err);
  }
}

function toast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast_m').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

function cls(id) {
  const s = document.getElementById(id);
  s.querySelectorAll('input[type=text],input[type=date],textarea').forEach(e => e.value = '');
  s.querySelectorAll('input[type=radio]').forEach(e => e.checked = false);
  s.querySelectorAll('select').forEach(e => e.selectedIndex = 0);
  s.querySelectorAll('.sb').forEach(b => b.classList.remove('sel'));
  document.querySelectorAll('.auto-date').forEach(e => e.valueAsDate = new Date());
}

document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('on', b.textContent === lang.toUpperCase()));
applyLang();
document.querySelectorAll('.auto-date').forEach(e => e.valueAsDate = new Date());
</script>
